# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches:
      - main
      - artifacts
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Replace "SNAPSHOT" within POM version with date, build number and commit hash
        run: |
          snapshot_version=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          major_minor_patch=$(echo "${snapshot_version}" | sed 's/SNAPSHOT//g')
          date=$(date -u +%Y%m%d%H%M)
          release_candidate_version=${major_minor_patch}${date}-${{github.run_number}}-${GITHUB_SHA::8}
          ./mvnw versions:set -DnewVersion=${release_candidate_version}

      - name: Build with Maven
        run: ./mvnw -B -DmultiArchBuild=true -DskipTests deploy --file pom.xml
        env:
          GITHUB_ACTOR: ${{ github.repository_owner }} # used by io.fabric8:docker-maven-plugin
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # used by io.fabric8:docker-maven-plugin

      # https://github.com/actions/delete-package-versions
      - name: Remove outdated docker images
        uses: actions/delete-package-versions@v4
        with:
          package-name: "inventage/com.inventage.keycloak.custom.container"
          package-type: "container"
          min-versions-to-keep: 5
          delete-only-pre-release-versions: "true"

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # https://github.com/helm/chart-releaser-action
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm/src/generated
          pages_branch: gh-pages
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
